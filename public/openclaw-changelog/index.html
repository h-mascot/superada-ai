<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Weekly Changelog | SuperAda</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(14, 26, 43, 0.9);
      --line: rgba(120, 184, 255, 0.25);
      --text: #eef6ff;
      --muted: #9fb6d0;
      --cyan: #22d3ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg), #0d1b2a);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      font-size: 42px;
      margin: 0 0 12px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 20px;
      margin-bottom: 40px;
    }
    .week-card {
      display: block;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 16px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.2s;
    }
    .week-card:hover {
      border-color: var(--cyan);
      transform: translateY(-2px);
    }
    .week-card h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .week-card p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 8px;
      margin-top: 12px;
      background: rgba(34,211,238,0.15);
      color: var(--cyan);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>OpenClaw Weekly Changelog</h1>
    <p class="subtitle">Curated release reviews with opinion, not just a diff dump.</p>
    
    <a href="./2026-03-27.html" class="week-card">
      <h2>Week of March 27, 2026</h2>
      <p>ClawHub becomes the default, OpenAI API compatibility, plugin SDK cleanup, legacy removal. The week OpenClaw started acting like a platform.</p>
      <span class="tag">v2026.3.22</span>
      <span class="tag">v2026.3.23</span>
      <span class="tag">v2026.3.24</span>
    </a>
    
    <!-- Future weeks will be added here -->
  </div>
</body>
</html>
